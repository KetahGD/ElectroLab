<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroLab - Gestión de Productos</title>
    <link rel="icon" href="img/logo.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="Estilos/GProductos.css">

</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom py-2 shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center fw-bold fs-4 text-dark" href="#">
                <img src="img/logo.png" alt="ElectroLab Logo" class="logo-img">
                ElectroLab
            </a>
            <div class="d-flex align-items-center ms-auto">
                <div class="text-end me-2 lh-1">
                    <small class="d-block fw-bold text-dark" style="font-size: 0.8rem;">USUARIO</small>
                    <small class="d-block text-dark" style="font-size: 0.75rem;">BIENVENIDO ADMIN</small>
                </div>
                <i class="bi bi-person-circle fs-3 text-secondary"></i>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-3 col-md-2 col-lg-1 d-md-block sidebar p-0">
                <ul class="nav flex-column w-100">
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="#">
                            <div class="icon-circle"><i class="bi bi-house-door-fill"></i></div>
                            Home
                        </a>
                    </li>
                    <li class="nav-item nav-item-active">
                        <a class="nav-link" aria-current="page" href="#">
                            <div class="icon-circle"><i class="bi bi-box-seam-fill"></i></div>
                            Productos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="#">
                            <div class="icon-circle"><i class="bi bi-list-ul"></i></div>
                            Inventario
                        </a>
                    </li>
                </ul>
            </nav>

            <main class="col-9 col-md-10 col-lg-11 ms-sm-auto px-md-5 pt-4 pb-5">
                
                <div class="card-custom">
                    <h4 class="card-title">Agregar Productos</h4>
                    <form id="form-producto">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="row mb-3 align-items-center">
                                    <label for="txt_clave" class="col-sm-3 col-form-label form-label-custom">Clave</label>
                                    <div class="col-sm-9">
                                        <input type="text" class="form-control form-control-custom" id="txt_clave" name="txt_clave">
                                    </div>
                                </div>
                                <div class="row mb-3 align-items-center">
                                    <label for="txt_nombre" class="col-sm-3 col-form-label form-label-custom">Nombre</label>
                                    <div class="col-sm-9">
                                        <input type="text" class="form-control form-control-custom" id="txt_nombre" name="txt_nombre">
                                    </div>
                                </div>
                                <div class="row mb-3 align-items-center">
                                    <label for="txt_precio" class="col-sm-3 col-form-label form-label-custom">Precio</label>
                                    <div class="col-sm-9">
                                        <input type="text" class="form-control form-control-custom" id="txt_precio" name="txt_precio">
                                    </div>
                                </div>
                                <div class="row mb-3 align-items-center">
                                    <label for="file_foto" class="col-sm-3 col-form-label form-label-custom">Foto</label>
                                    <div class="col-sm-9">
                                        <input type="file" class="form-control form-control-custom" id="file_foto" name="file_foto" style="font-size: 0.8rem;">
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="row mb-3">
                                    <div class="col-12 text-end">
                                        <select class="form-select w-50 ms-auto form-select-custom" id="sel_categoria" name="sel_categoria">
                                            <option selected disabled>Categoria</option>
                                            </select>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-12">
                                        <label for="txt_descripcion" class="form-label form-label-custom">Descripción</label>
                                        <textarea class="form-control form-control-custom" id="txt_descripcion" name="txt_descripcion" rows="4"></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row mt-2">
                            <div class="col-12 text-end">
                                <button type="button" class="btn btn-guardar" id="btn_guardar_producto">Guardar</button>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="card-custom">
                    <h4 class="card-title">Listado de Productos</h4>
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover table-custom mt-2">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Categoría</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-productos-body">
                                <tr>
                                    <td>10</td>
                                    <td>Arduino Uno</td>
                                    <td>Microcontroladores</td>
                                    <td>450.00</td>
                                    <td>15</td>
                                    <td>
                                        <i class="bi bi-pencil-fill action-icon" title="Editar"></i>
                                        <i class="bi bi-trash-fill action-icon" title="Eliminar"></i>
                                    </td>
                                </tr>
                                <tr>
                                    <td>2</td>
                                    <td>Sensor HC-SR04</td>
                                    <td>Sensores</td>
                                    <td>85.50</td>
                                    <td>100</td>
                                    <td>
                                        <i class="bi bi-pencil-fill action-icon" title="Editar"></i>
                                        <i class="bi bi-trash-fill action-icon" title="Eliminar"></i>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
