<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroLab - Carrito de Compras</title>
    <link rel="icon" href="img/logo.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="Estilos/carrito.css">

</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom py-2 shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center fw-bold fs-4 text-dark" href="#">
                <img src="img/logo.png" alt="ElectroLab Logo" class="logo-img">
                ElectroLab
            </a>
            <div class="d-flex align-items-center ms-auto">
                <div class="text-end me-2 lh-1">
                    <small class="d-block fw-bold text-dark" style="font-size: 0.8rem;">USUARIO</small>
                    <small class="d-block text-dark" style="font-size: 0.75rem;">BIENVENIDO ADMIN</small>
                </div>
                <i class="bi bi-person-circle fs-3 text-secondary"></i>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-3 col-md-2 col-lg-1 d-md-block sidebar p-0 border-end">
                <ul class="nav flex-column w-100">
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="#">
                            <div class="icon-circle"><i class="bi bi-house-door-fill"></i></div>
                            Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">
                            <div class="icon-circle"><i class="bi bi-box-seam-fill"></i></div>
                            Productos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="#">
                            <div class="icon-circle"><i class="bi bi-list-ul"></i></div>
                            Inventario
                        </a>
                    </li>
                </ul>
            </nav>

            <main class="col-9 col-md-10 col-lg-11 ms-sm-auto px-md-5 pt-4 pb-5">
                
                <h4 class="text-secondary fw-bold mb-4" style="color: #8fa0b3 !important;">Carrito de Compras</h4>
                
                <div class="row g-4">
                    <div class="col-lg-8">
                        <div class="card card-custom h-100" style="min-height: 500px;">
                            <div class="card-header-custom">
                                <h5 class="card-title">Productos Seleccionados</h5>
                            </div>
                            <div class="card-body" id="lista-carrito">
                                </div>
                        </div>
                    </div>

                    <div class="col-lg-4">
                        <div class="card card-custom h-100">
                            <div class="card-header-custom">
                                <h5 class="card-title">Resumen del Pedido</h5>
                            </div>
                            <div class="card-body p-4 d-flex flex-column">
                                
                                <div class="summary-row mt-2">
                                    <span>Sub Total</span>
                                    <span id="subtotal-val">$0.00</span>
                                </div>
                                <div class="summary-row">
                                    <span>Envio</span>
                                    <span id="envio-val">$0.00</span>
                                </div>
                                <div class="summary-row summary-total mb-4 mt-2">
                                    <span>Total de Envio</span>
                                    <span id="total-val">$0.00</span>
                                </div>

                                <div class="mt-auto mb-4">
                                    <input type="text" class="form-control input-cupon" placeholder="Ingresa cupon de descuento">
                                </div>

                                <button class="btn w-100 btn-checkout" id="btn-finalizar">FINALIZAR COMPRA</button>

                            </div>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
