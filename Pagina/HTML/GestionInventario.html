<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroLab - Gestión de Inventarios</title>
    <link rel="icon" href="img/logo.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { background-color: #f4f6f9; font-family: system-ui, -apple-system, sans-serif; }
        
        /* Navbar Superior */
        .navbar-custom { background-color: #ffffff; border-bottom: 1px solid #dee2e6; }
        .logo-img { width: 35px; height: auto; margin-right: 10px; }
        
        /* Menú Lateral */
        .sidebar { background-color: #f8f9fa; min-height: calc(100vh - 65px); padding-top: 20px; border-right: 1px solid #dee2e6; }
        .nav-item { margin-bottom: 10px; }
        .nav-link { color: #6c757d; font-size: 0.85rem; text-align: center; font-weight: 600; padding: 15px 5px; transition: 0.3s; }
        
        /* Iconos circulares del menú */
        .icon-circle { 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: #e9ecef; 
            margin: 0 auto 5px auto; 
            font-size: 1.4rem;
            color: #adb5bd;
        }
        
        /* Estado Activo (Fondo azul degradado) */
        .nav-item-active { background: linear-gradient(180deg, #f8f9fa 0%, #e1edff 50%, #f8f9fa 100%); border-right: 4px solid #0d6efd; }
        .nav-item-active .nav-link { color: #0d6efd; }
        .nav-item-active .icon-circle { background-color: #0d6efd; color: #ffffff; box-shadow: 0 0 0 4px #cfe2ff; }

        /* Tarjetas (Cards) */
        .card-custom {
            background-color: #ffffff;
            border: 1px solid #ced4da;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            margin-bottom: 25px;
        }
        .card-title { font-size: 1.3rem; font-weight: 600; color: #000; margin-bottom: 20px; }

        /* Estilos de Tablas */
        .table-custom th { font-weight: 600; color: #333; background-color: #f1f3f5; border-bottom: 2px solid #dee2e6; text-align: center; vertical-align: middle; }
        .table-custom td { vertical-align: middle; text-align: center; color: #495057; }
        .table-custom td:first-child { text-align: left; font-weight: 500; } /* Alinear el nombre del producto a la izquierda */
        
        /* Inputs de la tabla de control de stock */
        .input-stock { width: 60px; text-align: center; border-radius: 4px; border: 1px solid #ced4da; padding: 2px 5px; margin: 0 auto; display: block; color: #495057; }
        .input-stock:focus { border-color: #86b7fe; outline: 0; box-shadow: 0 0 0 0.25rem rgba(13,110,253,.25); }

        .action-icon { cursor: pointer; font-size: 1.2rem; margin: 0 5px; color: #6c757d; transition: 0.2s; }
        .action-icon:hover { color: #0d6efd; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom py-2 shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center fw-bold fs-4 text-dark" href="#">
                <img src="img/logo.png" alt="ElectroLab Logo" class="logo-img">
                ElectroLab
            </a>
            <div class="d-flex align-items-center ms-auto">
                <div class="text-end me-2 lh-1">
                    <small class="d-block fw-bold text-dark" style="font-size: 0.8rem;">USUARIO</small>
                    <small class="d-block text-dark" style="font-size: 0.75rem;">BIENVENIDO ADMIN</small>
                </div>
                <i class="bi bi-person-circle fs-3 text-secondary"></i>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-3 col-md-2 col-lg-1 d-md-block sidebar p-0">
                <ul class="nav flex-column w-100">
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="#">
                            <div class="icon-circle"><i class="bi bi-house-door-fill"></i></div>
                            Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="#">
                            <div class="icon-circle"><i class="bi bi-box-seam-fill"></i></div>
                            Productos
                        </a>
                    </li>
                    <li class="nav-item nav-item-active">
                        <a class="nav-link" aria-current="page" href="#">
                            <div class="icon-circle"><i class="bi bi-list-ul"></i></div>
                            Inventario
                        </a>
                    </li>
                </ul>
            </nav>

            <main class="col-9 col-md-10 col-lg-11 ms-sm-auto px-md-5 pt-4 pb-5">
                
                <div class="card-custom">
                    <h4 class="card-title">Control de Inventario-Sucursal</h4>
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover table-custom mt-2">
                            <thead>
                                <tr>
                                    <th style="text-align: left;">Producto</th>
                                    <th>Sucursal Norte</th>
                                    <th>Sucursal Sur</th>
                                    <th>Almacén Central</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-control-sucursales">
                                <tr>
                                    <td>Arduino Uno</td>
                                    <td><input type="number" class="input-stock" value=""></td>
                                    <td><input type="number" class="input-stock" value="12"></td>
                                    <td><input type="number" class="input-stock" value="1"></td>
                                </tr>
                                <tr>
                                    <td>Arduino Uno</td> <td><input type="number" class="input-stock" value="1"></td>
                                    <td><input type="number" class="input-stock" value=""></td>
                                    <td><input type="number" class="input-stock" value="1"></td>
                                </tr>
                                <tr>
                                    <td>Sensor de Humedad</td>
                                    <td><input type="number" class="input-stock" value="2"></td>
                                    <td><input type="number" class="input-stock" value=""></td>
                                    <td><input type="number" class="input-stock" value="1"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="card-custom">
                    <h4 class="card-title">Listado de Productos</h4>
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover table-custom mt-2">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Categoría</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-listado-productos">
                                <tr>
                                    <td style="text-align: center; font-weight: normal;">10</td>
                                    <td></td>
                                    <td></td>
                                    <td>1</td>
                                    <td>1</td>
                                    <td>
                                        <i class="bi bi-pencil-fill action-icon text-dark" title="Editar"></i>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="text-align: center; font-weight: normal;">2</td>
                                    <td></td>
                                    <td></td>
                                    <td>1</td>
                                    <td>X5</td>
                                    <td>
                                        <i class="bi bi-trash-fill action-icon text-dark" title="Eliminar"></i>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="text-align: center; font-weight: normal;">5</td>
                                    <td></td>
                                    <td></td>
                                    <td>15</td>
                                    <td>X3</td>
                                    <td>
                                        <i class="bi bi-trash-fill action-icon text-dark" title="Eliminar"></i>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="text-align: center; font-weight: normal;">XX</td>
                                    <td></td>
                                    <td></td>
                                    <td>15</td>
                                    <td>X5</td>
                                    <td>
                                        <i class="bi bi-trash-fill action-icon text-dark" title="Eliminar"></i>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
