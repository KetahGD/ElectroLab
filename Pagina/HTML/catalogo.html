<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroLab - Catálogo</title>
    <link rel="icon" href="img/logo.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="Estilos/catalogo.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom py-2">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center fw-bold fs-4" href="#">
                <img src="img/logo.png" alt="ElectroLab Logo" class="logo-img">
                ElectroLab
            </a>
            <div class="d-flex align-items-center ms-auto">
                <div class="text-end me-3 lh-sm">
                    <small class="d-block fw-bold">USUARIO</small>
                    <small class="d-block text-muted">BIENVENIDO ADMIN</small>
                </div>
                <i class="bi bi-person-circle fs-2 text-secondary"></i>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 col-lg-1 d-md-block sidebar collapse p-0">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                <i class="bi bi-house-door-fill text-primary"></i> Home
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">
                                <i class="bi bi-box-seam-fill"></i> Productos
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                <i class="bi bi-list-ul"></i> Inventario
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-10 col-lg-11 ms-sm-auto px-md-4 pt-3">
                
                <div class="row mb-4">
                    <div class="col-md-8">
                        <div class="input-group mb-3">
                            <span class="input-group-text bg-white rounded-start-pill border-end-0"><i class="bi bi-search"></i></span>
                            <input type="search" class="form-control rounded-end-pill border-start-0 search-bar" placeholder="Buscar productos...">
                        </div>
                        
                        <div class="d-flex align-items-center mt-2">
                            <span class="fw-bold me-3">Categorias</span>
                            <button class="category-pill">Chips</button>
                            <button class="category-pill">Controladores</button>
                            <button class="category-pill">Kits</button>
                            <button class="category-pill">Otros</button>
                            <button class="btn btn-sm btn-light border rounded-circle"><i class="bi bi-chevron-right"></i></button>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="cart-widget d-flex flex-column">
                            <span class="fw-bold mb-1">MI CARRITO</span>
                            <span class="text-muted mb-2">(0 Productos)</span>
                            <div class="d-flex justify-content-between align-items-center">
                                <button class="btn btn-primary rounded-pill px-4">Ver Carrito</button>
                                <span class="fw-bold">Total: $0.00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4" id="contenedor-productos">
                    </div>

                <button class="btn btn-primary btn-floating shadow">+ Nuevo Producto</button>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
