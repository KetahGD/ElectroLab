<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroLab - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="/img/Logo.ico" rel="icon">
    <link rel="stylesheet" href="style.css">
    

</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-light">

    <div class="login-card p-5 bg-white shadow-sm text-center">
        <div class="logo-container mb-2">
            <img src="https://cdn-icons-png.flaticon.com/512/3067/3067451.png" alt="ElectroLab Logo" class="logo-img">
        </div>
        <h2 class="fw-bold mb-1">ElectroLab</h2>
        <p class="text-secondary small mb-4">Bienvenido Devuelta</p>

        <form id="loginForm">
    <div class="mb-3">
        <div class="input-group custom-input-group">
            <span class="input-group-text bg-transparent border-end-0">
                <i class="fa-solid fa-envelope text-muted"></i>
            </span>
            <input type="email" id="txt_email" class="form-control border-start-0" placeholder="Correo Electronico" required>
        </div>
    </div>

    <div class="mb-2">
        <div class="input-group custom-input-group">
            <span class="input-group-text bg-transparent border-end-0">
                <i class="fa-solid fa-key text-muted"></i>
            </span>
            <input type="password" id="txt_password" class="form-control border-start-0 border-end-0" placeholder="Contraseña" required>
            <span class="input-group-text bg-transparent border-start-0 cursor-pointer" id="b_visible">
                <i class="fa-regular fa-eye text-muted"></i>
            </span>
        </div>
    </div>

    <div class="text-end mb-4">
        <a href="#" class="forgot-password-link small text-decoration-underline text-dark">¿Olvidaste tu contraseña?</a>
    </div>

    <button type="button" id="bt_enviar" class="btn btn-dark w-100 rounded-pill py-2 fw-bold">INGRESAR</button>
</form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="manejo_sesion.js"></script>

</body>
</html>
